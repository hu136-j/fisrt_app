<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>时间记录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部栏 -->
    <header id="header">
      <h1>⏱ 时间记录</h1>
      <div class="header-actions">
        <button id="themeToggle" class="btn-icon" title="切换深色/浅色模式">🌙</button>
        <button id="exportBtn" class="btn-secondary" title="导出记录为CSV">📤 导出</button>
        <button id="importBtn" class="btn-secondary" title="从CSV导入记录">📥 导入</button>
      </div>
    </header>

    <!-- 主体区域 -->
    <div class="main-body">
      <!-- 左侧面板 -->
      <aside class="left-panel">
        <!-- 计时器 -->
        <section class="card timer-card">
          <div class="timer-circle" id="timerCircle">
            <span class="timer-time" id="timerDisplay">00:00:00</span>
            <span class="timer-label" id="timerLabel">准备开始</span>
          </div>
          <button id="timerBtn" class="btn-primary btn-timer">▶ 开始计时</button>
          <div class="timer-meta">
            <select id="timerTag" class="select-field">
              <option value="工作">💼 工作</option>
              <option value="学习">📚 学习</option>
              <option value="生活">🏠 生活</option>
              <option value="娱乐">🎮 娱乐</option>
            </select>
            <input type="text" id="timerActivity" class="input-field" placeholder="正在做什么？（可选）">
          </div>
        </section>

        <!-- 手动录入 -->
        <section class="card manual-card">
          <h3>📝 手动录入</h3>
          <div class="form-group">
            <input type="text" id="manualActivity" class="input-field" placeholder="活动内容 *">
          </div>
          <div class="form-row">
            <label>开始</label>
            <input type="datetime-local" id="manualStart" class="input-field">
          </div>
          <div class="form-row">
            <label>结束</label>
            <input type="datetime-local" id="manualEnd" class="input-field">
          </div>
          <div class="form-group">
            <select id="manualTag" class="select-field">
              <option value="工作">💼 工作</option>
              <option value="学习">📚 学习</option>
              <option value="生活">🏠 生活</option>
              <option value="娱乐">🎮 娱乐</option>
            </select>
          </div>
          <button id="addManualBtn" class="btn-primary btn-full">添加记录</button>
        </section>
      </aside>

      <!-- 右侧主内容 -->
      <main class="right-panel">
        <!-- 日期导航 -->
        <div class="date-nav card">
          <button id="prevDay" class="btn-icon">◀</button>
          <input type="date" id="datePicker" class="input-field date-input">
          <button id="nextDay" class="btn-icon">▶</button>
          <button id="todayBtn" class="btn-secondary btn-today">今天</button>
          <span class="date-total" id="dateTotal">总计 0 小时</span>
        </div>

        <!-- 时间范围筛选 -->
        <div class="range-bar card hidden" id="rangeBar">
          <div class="range-bar-top">
            <button id="rangeToggle" class="btn-secondary" title="切换时间范围模式">📅 时间范围</button>
            <div class="range-pickers" id="rangePickers" style="display:none">
              <label>从</label>
              <input type="date" id="rangeStartPicker" class="input-field range-input">
              <label>至</label>
              <input type="date" id="rangeEndPicker" class="input-field range-input">
              <div class="range-presets">
                <button class="preset-btn" data-preset="today">今天</button>
                <button class="preset-btn" data-preset="week">本周</button>
                <button class="preset-btn" data-preset="month">本月</button>
                <button class="preset-btn" data-preset="last7">近7天</button>
                <button class="preset-btn" data-preset="last30">近30天</button>
              </div>
            </div>
            <span class="date-total" id="rangeTotal" style="display:none"></span>
            <button id="rangeExportBtn" class="btn-secondary" style="display:none" title="导出范围数据">📤 导出范围</button>
          </div>
        </div>

        <!-- 时间线 -->
        <section class="card timeline-section">
          <h3>📋 时间线</h3>
          <div id="timeline" class="timeline-list">
            <div class="empty-state">今天还没有记录，点击左侧按钮开始计时吧！</div>
          </div>
        </section>

        <!-- 统计图表 -->
        <section class="card stats-section">
          <h3>📊 数据统计</h3>
          <div class="charts-row">
            <div class="chart-container">
              <canvas id="pieChart" width="250" height="250"></canvas>
            </div>
            <div class="chart-container chart-bar">
              <canvas id="barChart" width="400" height="200"></canvas>
            </div>
          </div>
          <div class="tag-summary" id="tagSummary"></div>
          <div class="trend-chart-container hidden" id="trendChartContainer">
            <h4>📈 每日趋势</h4>
            <canvas id="trendChart" width="800" height="250"></canvas>
          </div>
        </section>
      </main>
    </div>

    <!-- 状态栏 -->
    <footer id="statusBar">
      <span id="statusText">就绪</span>
      <span id="dataPath" class="status-path"></span>
    </footer>
  </div>

  <!-- 编辑弹窗 -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>✏️ 编辑记录</h3>
      <div class="form-group">
        <label>活动内容</label>
        <input type="text" id="editActivity" class="input-field">
      </div>
      <div class="form-row">
        <label>开始时间</label>
        <input type="datetime-local" id="editStart" class="input-field">
      </div>
      <div class="form-row">
        <label>结束时间</label>
        <input type="datetime-local" id="editEnd" class="input-field">
      </div>
      <div class="form-group">
        <label>标签</label>
        <select id="editTag" class="select-field">
          <option value="工作">💼 工作</option>
          <option value="学习">📚 学习</option>
          <option value="生活">🏠 生活</option>
          <option value="娱乐">🎮 娱乐</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="saveEditBtn" class="btn-primary">保存</button>
        <button id="cancelEditBtn" class="btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
